<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Robot head -->
  <ellipse cx="100" cy="72" rx="52" ry="48" fill="white" stroke="#333" stroke-width="4"/>
  <!-- Visor -->
  <path d="M58 55 Q100 45 142 55 Q145 80 100 85 Q55 80 58 55Z" fill="#1a1a2e" rx="10"/>
  <!-- Eyes -->
  <circle cx="80" cy="68" r="10" fill="#F97316"/>
  <circle cx="80" cy="68" r="5" fill="#FBBF24"/>
  <circle cx="120" cy="68" r="10" fill="#F97316"/>
  <circle cx="120" cy="68" r="5" fill="#FBBF24"/>
  <!-- Smile -->
  <path d="M85 78 Q100 88 115 78" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Orange stripe on head -->
  <path d="M60 45 Q100 38 140 45" fill="none" stroke="#F97316" stroke-width="3"/>
  <!-- Antenna -->
  <line x1="100" y1="24" x2="100" y2="14" stroke="#333" stroke-width="3"/>
  <circle cx="100" cy="11" r="5" fill="#F97316"/>
  <!-- Ear pieces -->
  <ellipse cx="48" cy="72" rx="10" ry="14" fill="#F97316" stroke="#333" stroke-width="2"/>
  <ellipse cx="152" cy="72" rx="10" ry="14" fill="#F97316" stroke="#333" stroke-width="2"/>
  <!-- Neck -->
  <rect x="90" y="118" width="20" height="12" rx="3" fill="#F97316" stroke="#333" stroke-width="2"/>
  <!-- Body -->
  <rect x="65" y="128" width="70" height="50" rx="15" fill="white" stroke="#333" stroke-width="4"/>
  <!-- Orange belt -->
  <rect x="65" y="150" width="70" height="10" fill="#F97316" opacity="0.3"/>
  <!-- Book -->
  <rect x="72" y="155" width="30" height="22" rx="2" fill="#F97316" stroke="#333" stroke-width="2"/>
  <line x1="87" y1="155" x2="87" y2="177" stroke="#333" stroke-width="1.5"/>
  <rect x="74" y="160" width="11" height="2" rx="1" fill="white" opacity="0.7"/>
  <rect x="74" y="164" width="9" height="2" rx="1" fill="white" opacity="0.5"/>
  <rect x="89" y="160" width="11" height="2" rx="1" fill="white" opacity="0.7"/>
  <rect x="89" y="164" width="9" height="2" rx="1" fill="white" opacity="0.5"/>
  <!-- Left arm (waving) -->
  <path d="M65 138 Q40 125 35 105" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <circle cx="35" cy="105" r="3" fill="#F97316"/>
  <!-- Right arm (holding book) -->
  <path d="M135 138 Q145 150 105 170" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="85" cy="182" rx="14" ry="10" fill="white" stroke="#333" stroke-width="3"/>
  <ellipse cx="115" cy="182" rx="14" ry="10" fill="white" stroke="#333" stroke-width="3"/>
</svg>