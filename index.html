    <!-- Dark mode by default. Applied before React mounts to avoid a light flash. -->
    <script>
      (function () {
        try {
          // Wipe legacy preference so old users get the new default (dark)
          localStorage.removeItem('dark_mode');
          var stored = localStorage.getItem('dark_mode_v2');
          var dark = stored === null || stored === undefined ? true : JSON.parse(stored);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Prevent flash before the theme script runs — matches new design tokens */
      html { background-color: #0E1B2E; } /* dark: --background */
      html:not(.dark) { background-color: #F8F9FB; } /* light: --background */
    </style>
